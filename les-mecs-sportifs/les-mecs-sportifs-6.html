<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Les Mecs Sportifs — Noah Bill</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --black: rgba(0, 0, 0, 0.85);
      --black-mid: rgba(0, 0, 0, 0.5);
      --white: rgba(255, 255, 255, 0.95);
      --white-mid: rgba(255, 255, 255, 0.6);
    }

    body {
      font-family: 'Open Sans', sans-serif;
      background: #fff;
      color: var(--black);
    }

    /* --- HEADER über dem Bild --- */
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 1.5rem 1.75rem;
      mix-blend-mode: difference;
    }

    .name {
      font-size: 1.1rem;
      font-weight: 600;
      line-height: 1.2;
      letter-spacing: -0.02em;
      text-decoration: none;
      color: #fff;
    }

    .name span {
      display: block;
      font-weight: 400;
      opacity: 0.7;
    }

    nav a {
      font-size: 1.1rem;
      font-weight: 500;
      color: #fff;
      text-decoration: none;
      letter-spacing: -0.02em;
    }

    /* --- BILDER REIHE --- */
    .img-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .img-row img {
      width: 100%;
      height: calc(100vh - 5rem);
      object-fit: cover;
      display: block;
    }

    .img-row.first img {
      height: calc(100vh - 4rem); /* wird per JS präzise gesetzt */
    }

    /* --- MARQUEE --- */
    .marquee-wrap {
      overflow: hidden;
      white-space: nowrap;
      padding: 0.4rem 0;
      background: #111;
    }

    .marquee-track {
      display: inline-block;
      animation: marquee 22s linear infinite;
    }

    .marquee-track span {
      font-family: 'Open Sans', sans-serif;
      font-weight: 800;
      font-style: normal;
      font-size: clamp(2rem, 4vw, 3.5rem);
      letter-spacing: -0.04em;
      text-transform: uppercase;
      color: #fff;
      padding-right: 1rem;
    }

    .marquee-track .dot {
      font-style: normal;
      color: rgba(255,255,255,0.4);
      padding-right: 1rem;
      font-size: 0.6em;
      vertical-align: middle;
    }

    @keyframes marquee {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    /* --- BESCHREIBUNG --- */
    .description {
      padding: 3rem 1.75rem 6rem;
      border-top: 1.5px solid var(--black);
    }

    .desc-text {
      font-size: 1.35rem;
      line-height: 1.5;
      letter-spacing: -0.01em;
      color: var(--black);
    }

    /* --- BACK --- */
    .back {
      display: inline-block;
      padding: 0 1.75rem 3rem;
      font-size: 1rem;
      font-weight: 500;
      color: var(--black-mid);
      text-decoration: none;
    }

    .back:hover { color: var(--black); }
  </style>
</head>
<body>

  <!-- HEADER über Bild -->
  <header>
    <a class="name" href="index.html">
      noah bill<br>
      <span>graphic design</span>
    </a>
    <nav><a href="#">Info</a></nav>
  </header>

  <!-- BILDER REIHE 1 -->
  <div class="img-row first">
    <img src="images/les-mecs-sportifs/dede-shooting.jpg" alt="Les Mecs Sportifs">
    <img src="images/les-mecs-sportifs/trikot-closeup.jpeg" alt="Les Mecs Sportifs">
  </div>

  <!-- MARQUEE -->
  <div class="marquee-wrap">
    <div class="marquee-track">
      <span>LES MECS SPORTIFS</span>
      <span class="dot">·</span>
      <span>LES MECS SPORTIFS</span>
      <span class="dot">·</span>
      <span>LES MECS SPORTIFS</span>
      <span class="dot">·</span>
      <span>LES MECS SPORTIFS</span>
      <span class="dot">·</span>
      <span>LES MECS SPORTIFS</span>
      <span class="dot">·</span>
      <span>LES MECS SPORTIFS</span>
      <span class="dot">·</span>
    </div>
  </div>

  <!-- BILDER REIHE 2 -->
  <div class="img-row">
    <video src="images/les-mecs-sportifs/trikot-video.mp4" autoplay muted loop playsinline style="width:100%;height:calc(100vh - 5rem);object-fit:cover;display:block;"></video>
    <img src="images/les-mecs-sportifs/dede-shooting1.jpg" alt="Les Mecs Sportifs">
  </div>

  <!-- BESCHREIBUNG -->
  <div class="description">
    <p class="desc-text">
      Kurze Beschreibung des Projekts. Was war die Aufgabe, was war dein Ansatz, 
      was macht dieses Projekt besonders? 2–3 Sätze reichen völlig.
    </p>
  </div>

  <script>
    function fixHeight() {
      var marquee = document.querySelector('.marquee-wrap');
      var marqueeH = marquee.offsetHeight;
      var viewH = window.innerHeight;
      var imgH = viewH - marqueeH;
      document.querySelectorAll('.img-row.first img').forEach(function(img) {
        img.style.height = imgH + 'px';
      });
    }
    fixHeight();
    window.addEventListener('resize', fixHeight);
  </script>

</body>
</html>
